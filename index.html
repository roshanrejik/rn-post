let cur=0;
const nav=document.getElementById('dotnav');
const sl=document.getElementById('slides');
S.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.onclick=()=>go2(i);
  nav.appendChild(d);
  const el=document.createElement('div');
  el.className='slide'+(i===0?' on':'');
  el.innerHTML=s.h;
  sl.appendChild(el);
});
function go2(n){
  document.querySelectorAll('.slide')[cur].classList.remove('on');
  document.querySelectorAll('.dot')[cur].classList.remove('on');
  cur=(n+S.length)%S.length;
  document.querySelectorAll('.slide')[cur].classList.add('on');
  document.querySelectorAll('.dot')[cur].classList.add('on');
  document.getElementById('ctr').textContent=(cur+1)+' / '+S.length;
}
function go(d){go2(cur+d);}
